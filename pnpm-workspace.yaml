packages:
  - 'shared'
  - 'server'
  - 'client'
allowBuilds:
  esbuild: true
onlyBuiltDependencies:
  - esbuild
# Force patched versions of dependencies that have known security
# advisories. As of June 2026:
#   - vite 6.4.3 fixes GHSA-4w7w-66w2-5vf9 (path traversal in .map),
#     GHSA-v6wh-96g9-6wx3 (NTLMv2 disclosure via UNC), and
#     GHSA-fx2h-pf6j-xcff (server.fs.deny bypass on Windows).
#   - esbuild 0.25.0 fixes GHSA-67mh-4wv8-2f99 (dev server SSRF).
# Required because vitest 3.2.6 declares a vite 5.x peer dep, which
# would otherwise pull a vulnerable vite nested in server/node_modules.
overrides:
  vite: ^6.4.3
  esbuild: ^0.25.0
